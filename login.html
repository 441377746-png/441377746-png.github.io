<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>寰宇永灿消防技术平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;display:flex;min-height:100vh;align-items:center;justify-content:center}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:32px;width:100%;max-width:380px;text-align:center}
.logo{display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.shield{width:48px;height:48px;background:#e8f0fe;border-radius:50%;display:flex;align-items:center;justify-content:center}
h1{font-size:20px;margin-bottom:4px;color:#1a1a1a}
.sub{font-size:13px;color:#666;margin-bottom:24px}
input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:16px;text-align:center;letter-spacing:2px;margin-bottom:16px;outline:none;transition:border-color .2s}
input:focus{border-color:#2563eb}
.btn{width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s}
.btn:hover{background:#1d4ed8}
.btn:disabled{opacity:.6;cursor:not-allowed}
.error{background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:10px;margin-bottom:12px;font-size:13px;color:#dc2626;display:none}
.hint{font-size:11px;color:#999;margin-top:16px}
</style>
</head>
<body>
<div class="card">
<div class="logo"><div class="shield"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg></div></div>
<h1>寰宇永灿消防技术平台</h1>
<p class="sub">请输入注册码登录</p>
<div class="error" id="errMsg"></div>
<form id="loginForm">
<input type="text" id="code" placeholder="如 HY-YC-2026-001" autofocus>
<button class="btn" id="loginBtn" type="submit">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z"/><circle cx="16.5" cy="7.5" r=".5"/></svg>
  登录
</button>
</form>
<p class="hint">有效注册码：HY-YC-2026-001 ~ 006（共 6 个）</p>
</div>
<script>
const CODES=["HY-YC-2026-001","HY-YC-2026-002","HY-YC-2026-003","HY-YC-2026-004","HY-YC-2026-005","HY-YC-2026-006"];
const loginForm=document.getElementById('loginForm');
const codeInput=document.getElementById('code');
const errMsg=document.getElementById('errMsg');
const btn=document.getElementById('loginBtn');

// 已登录则跳转
if(localStorage.getItem('hy-fire-auth')){window.location.href='/dashboard'}

loginForm.addEventListener('submit',function(e){
  e.preventDefault();
  const code=codeInput.value.trim().toUpperCase();
  if(!CODES.includes(code)){errMsg.style.display='block';errMsg.textContent='注册码不正确';return}
  errMsg.style.display='none';
  btn.disabled=true;btn.innerHTML='⏳ 登录中...';
  localStorage.setItem('hy-fire-auth',JSON.stringify({code:code,loginAt:Date.now()}));
  setTimeout(function(){window.location.href='/dashboard'},100);
});
</script>
</body>
</html>
